<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudApp</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background-color: #111118;
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 180px;
            min-height: 100vh;
            background: #1a1a24;
            padding: 30px 16px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a38;
            flex-shrink: 0;
        }

        .sidebar-brand h2 {
            color: #f0a500;
            font-size: 1rem;
            font-weight: bold;
        }

        .sidebar-brand span {
            color: #666;
            font-size: 0.75rem;
        }

        .sidebar-nav {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .nav-item:hover {
            background: #22222e;
            color: #fff;
        }

        .nav-item.active {
            background: #2a2a3e;
            color: #fff;
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: #1a1a24;
            padding: 16px 30px;
            border-bottom: 1px solid #2a2a38;
        }

        .topbar-title {
            color: #f0a500;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */
        .contenedor {
            background: #1e1e2a;
            width: 420px;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0px 0px 40px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid #2a2a38;
        }

        .reloj {
            font-size: 52px;
            font-weight: bold;
            color: #f0a500;
            letter-spacing: 2px;
        }

        .fecha-texto {
            font-size: 11px;
            color: #888;
            letter-spacing: 3px;
            margin-top: 6px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .status-label {
            font-size: 10px;
            color: #f0a500;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: left;
            margin-bottom: 10px;
        }

        .app-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-info-left h2 {
            color: #ffffff;
            font-size: 22px;
            text-align: left;
        }

        .app-info-left p {
            color: #aaaaaa;
            font-size: 14px;
            text-align: left;
            margin-top: 4px;
        }

        .app-info-left p span {
            color: #ffffff;
            font-weight: bold;
        }

        .badge-online {
            background-color: #2a2a3a;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #444;
        }

        .botones {
            margin-top: 30px;
        }

        .btn-github {
            background: #2a2a3a;
            color: #ffffff;
            border: 1px solid #444;
            width: 100%;
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-github:hover { background: #333345; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h2>Cloud Panel</h2>
            <span>Active Session</span>
        </div>

        <nav class="sidebar-nav">
            <a href="/" class="nav-item active">
                <span>⊞</span> Dashboard
            </a>
            <a href="/formulario" class="nav-item">
                <span>☁</span> Formulario
            </a>
            <a href="/imagen" class="nav-item">
                <span>▦</span> Imagen
            </a>
            <a href="/tabla" class="nav-item">
                <span>▤</span> Tabla
            </a>
        </nav>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="topbar">
            <span class="topbar-title">CloudCore</span>
        </div>

        <div class="content">
            <div class="contenedor">

                <div class="reloj" id="reloj">00:00:00</div>
                <div class="fecha-texto" id="fecha-texto"></div>

                <hr style="border: none; border-top: 1px solid #2a2a38; margin: 20px 0;">

                <div class="status-label">Application Status</div>

                <div class="app-info">
                    <div class="app-info-left">
                        <h2>Aplicación en la Nube</h2>
                        <p>Estudiante: <span>Carlos Vidal</span></p>
                    </div>
                    <div class="badge-online">● Online</div>
                </div>

                <hr style="border: none; border-top: 1px solid #2a2a38; margin: 20px 0;">

                <div class="botones">
                    <a href="https://github.com/carlosruiiz02/CloudApp.git"
                       target="_blank" class="btn-github">GitHub</a>
                </div>

            </div>
        </div>

    </div>

    <script>
        const dias = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
        const meses = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
                       "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

        function actualizar() {
            const ahora = new Date();
            const h = String(ahora.getHours()).padStart(2, '0');
            const m = String(ahora.getMinutes()).padStart(2, '0');
            const s = String(ahora.getSeconds()).padStart(2, '0');
            document.getElementById("reloj").textContent = `${h}:${m}:${s}`;

            const dia = dias[ahora.getDay()];
            const mes = meses[ahora.getMonth()];
            const fecha = `${dia}, ${mes} ${ahora.getDate()}, ${ahora.getFullYear()}`;
            document.getElementById("fecha-texto").textContent = fecha;
        }

        actualizar();
        setInterval(actualizar, 1000);
    </script>

</body>
</html>
